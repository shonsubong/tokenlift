# GLM-5.2 fleet 매니페스트 — 서빙할 양자화 tier 목록
# 컬럼: alias  quant  port  ngl  n_cpu_moe  ctx    ('#' 주석/빈 줄 무시)
#  - alias     : TokenLift onprem-glm 의 model id 와 반드시 일치
#  - quant     : unsloth/GLM-5.2-GGUF 의 양자화 폴더명(UD-IQ2_M, UD-Q4_K_XL, Q8_0 ...)
#  - port      : 인스턴스 포트(사내망 공유 시 방화벽 허용)
#  - ngl       : GPU 레이어 수(99=가능한 전부)
#  - n_cpu_moe : MoE 전문가 레이어 CPU 오프로드 개수(0=오프로드 안 함/정규식 기본)
#  - ctx       : 컨텍스트 윈도우
#
# ⚠️ 메모리: tier 당 217GB(1bit)~801GB(8bit). 아래는 "예시"이며, 한 노드에 전부 동시
#    적재는 대개 불가하다. 노드 메모리에 맞게 tier 를 고르거나 노드별로 나눠 배치할 것.
#    (예: H200 노드A=q8, 노드B=q4, 소형 노드=q2)

# alias          quant         port  ngl  n_cpu_moe  ctx
glm-5.2-q8       Q8_0          8088  99   0          16384
glm-5.2-q4       UD-Q4_K_XL    8084  99   0          16384
glm-5.2-q2       UD-IQ2_M      8082  99   24         32768
